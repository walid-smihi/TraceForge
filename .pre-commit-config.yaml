repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: ruff check
        language: system
        types: [python]
        pass_filenames: true

      - id: ruff-format
        name: ruff format
        entry: ruff format --check
        language: system
        types: [python]
        pass_filenames: true

      - id: eslint
        name: eslint
        entry: npm run lint
        language: system
        files: \.(ts|tsx)$
        pass_filenames: false
        working_directory: apps/web
