version: '3.9'

services:

  frontend:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    volumes:
      - ./apps/web/src:/app/src
      - ./apps/web/public:/app/public
    depends_on:
      - backend
    networks:
      - traceforge-net
    restart: unless-stopped

  backend:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./apps/api:/app
      - ./storage:/app/storage
      - /home:/home:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - traceforge-net
    restart: unless-stopped
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  # Ollama is optional — only needed for local LLM inference.
  # Set LLM_PROVIDER=ollama in .env and start with: docker compose --profile ollama up
  # For GPU support (NVIDIA): docker compose -f docker-compose.yml -f docker-compose.gpu.yml --profile ollama up
  # For a cloud LLM (OpenAI-compatible): set LLM_PROVIDER=openai + OPENAI_API_KEY in .env
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - ollama
    networks:
      - traceforge-net
    restart: unless-stopped

volumes:
  ollama_data:

networks:
  traceforge-net:
    driver: bridge
