version: '3.9'

services:

  frontend:
    build:
      context: ./apps/web
      dockerfile: Dockerfile.prod
    environment:
      - NEXT_PUBLIC_API_URL=https://api.traceforge.dev
    networks:
      - traceforge-net
    restart: always

  backend:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    env_file:
      - .env.prod
    volumes:
      - ./storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - traceforge-net
    restart: always
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --workers 2

  worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    env_file:
      - .env.prod
    volumes:
      - ./storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - traceforge-net
    restart: always
    command: python -m rq worker --url ${REDIS_URL} traceforge-jobs

  postgres:
    image: pgvector/pgvector:pg16
    env_file:
      - .env.prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U traceforge -d traceforge"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - traceforge-net
    restart: always

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    networks:
      - traceforge-net
    restart: always

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/docker/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/docker/ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - backend
    networks:
      - traceforge-net
    restart: always

volumes:
  postgres_data:
  redis_data:

networks:
  traceforge-net:
    driver: bridge
